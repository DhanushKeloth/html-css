<!doctype html>
<html lang="en">
  <head>
    <title>HTML practice</title>
    <link rel="stylesheet" href="./index.css" />
  </head>
  <body>
    
      <h1>Hello world</h1>
      <p id="tagname">welcome to my world</p>
      <div class="container">
      <div id="card">
        <img src="./profile-image.png" style="display: block; margin-left: auto; margin-right: auto;" width=200px" alt="profile" />
        <h2 style="text-align: center;">My name is John Doe</h2>
        <p style="text-align: center;">I am a web developer</p>
        <p id="description" style="text-align: justify;">
          Lorem ipsum dolor sit amet consectetur adipisicing elit. Quia
          voluptatum, quod, quos eum quae quidem quibusdam quia quas quos
        </p>
      </div>
      <div id="login-form">
        <form>
            <h2 style="text-align: center;">Login</h2>
            <input type="text" placeholder="Username"/>
            <input type="password" placeholder="Password"/>
            <button type="submit">Login</button>
        </form>
      </div>
      </div>
  </body>
</html>
