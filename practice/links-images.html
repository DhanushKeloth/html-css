<!doctype html>
<html>
  <head>
    <title>Links & Images</title>
  </head>
  <style>
    #profile{
        border:2px solid black;
        border-radius: 10px;
        background-color: aqua;
        rotate: calc(90deg);
    }
  </style>
  <body>
    <h1>My Website</h1>

    <p>Here is a link to amazing resource for web development.</p>
    <ul>
      <li>
        <a
          href="https://developer.mozilla.org/en-US/docs/Web/HTML"
          target="_blank"
          >HTML (loads in a new tab)
        </a>
      </li>
      <li>
        <a
          href="https://developer.mozilla.org/en-US/docs/Web/CSS"
          target="_self"
          >CSS (loads in the same window)
        </a>
      </li>
      <li>
        <a
          href="https://developer.mozilla.org/en-US/docs/Web/JavaScript"
          target="_blank"
          >JavaScript (loads in a new tab)
        </a>
      </li>
    </ul>
    <h2>Here is a sample image</h2>
    <img src="./profile-image.png" alt="profile" width="250" height="250" id="profile"/>
    <figure>
        <img src="./bw-profile.jpg" alt="profile" width="250" height="250" />
        <figcaption>My profile picture</figcaption>
    </figure>
    
  </body>
</html>
