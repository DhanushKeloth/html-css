<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #btn{
            padding:10px 50px;
            background-color: rgb(131, 112, 185);

            color: white;
            border-radius: 5px;
            font-size: 15px;
            transition: 0.3s ease-in-out;
        }
        #btn:hover{
            transform: scale(1.06);
            background-color: rgb(107, 77, 190);
            box-shadow: 0px 0px 20px rgba(107, 77, 190, 0.4);   
        }
    </style>
</head>
<body>
    <div class="container">
        <button id="btn">Submit</button>
    </div>
</body>
</html>
