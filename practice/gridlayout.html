<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>grid layout</title>
  <style>
    body{
      
      height: 100vh;
    }
    .container{
      height: 100%;
      display: grid;
      grid-template-columns: 300px 1fr 80px;
      grid-template-rows: 60px 1fr 80px;
      gap:10px;
      
      
    }
    .container div{
      border: 2px solid black;
      background-color: aquamarine;
    }
    #box1{
      grid-column-start:1;
      grid-column-end: 4;
    }
    #box2{
      grid-row-start:2;
      grid-row-end: 3;
      grid-column: 1/2;

    }
    #box3{
      grid-column-start: 2;
      grid-column-end: 4;
      grid-row-start: 2;
      grid-row-end: 3;
    }
    #box4{
      grid-column-start: 1;
      grid-column-end: 4;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="box1"></div>
    <div id="box2"></div>
    <div id="box3"></div>
    <div id="box4"></div>
  </div>
</body>
</html>
