<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; 
            
        }
        .card{
            border: 2px solid white;
            width: min-content;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.2);  
            transition: 0.3s ease-in-out;
        }
        img{
            border-radius: 10px;
            
        }
        .card:hover{
            
            transform: scale(1.05);
            box-shadow: 0px 0px 20px rgba(0, 0, 0, 0.3);
        }
        #desc{
            font-size: 15px;
            color: #333;
        }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="./mountain.jpg" alt="mountain" width="300px" />
      <h2 id="title">Mount Everest</h2>
      <p id="desc">
        Mount Everest is a tallest mountain in the world. It is present in
        himalayas. This is the description about mount everest.
      </p>
    </div>
  </body>
</html>
